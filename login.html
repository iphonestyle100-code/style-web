<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IPHONE STYLE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>IPHONE STYLE</h1>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Correo electrónico" required>
                <input type="password" id="login-password" placeholder="Contraseña" required>
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
                <button type="button" id="btn-register" class="btn-secondary">Registrarse</button>
            </form>
            <hr>
            <div class="admin-access">
                <p>¿Eres administrador?</p>
                <input type="password" id="admin-key" placeholder="Clave de administrador">
                <button onclick="checkAdminAccess()" class="btn-admin">Ingresar como Admin</button>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
