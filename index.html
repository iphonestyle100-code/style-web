<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPHONE STYLE - Somos tu mejor opción</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para la vista de usuario */
        body { background: #f5f5f5; margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; color: #333; }
        
        header { 
            background: #000; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: white;
        }

        .hero { 
            background: #333; 
            color: white; 
            text-align: center; 
            padding: 40px 20px;
        }

        .hero h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        .hero p { margin: 10px 0 0; font-size: 16px; opacity: 0.8; }

        .search-bar-container { 
            background: #e0e0e0; 
            padding: 15px; 
            text-align: center; 
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-bar { 
            width: 80%; 
            max-width: 600px; 
            padding: 12px 20px; 
            border-radius: 25px; 
            border: 1px solid #ccc; 
            outline: none;
        }

        .grid-productos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px; 
            padding: 30px 5%; 
        }

        /* Estilo de Tarjeta tipo Premium */
        .product-card { 
            background: white; 
            border-radius: 8px; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: contain; 
            margin-bottom: 15px; 
        }

        .product-card h3 { font-size: 16px; margin: 10px 0; color: #555; font-weight: 400; }
        .product-card .price { font-size: 22px; font-weight: bold; color: #000; margin-bottom: 15px; }

        .btn-buy { 
            background: #000; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%;
            font-weight: bold;
        }

        .btn-admin-nav {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; font-size: 20px;">IPHONE STYLE</div>
        <a href="login.html" class="btn-admin-nav">Ingresar</a>
    </header>

    <section class="hero">
        <h1>IPHONE STYLE: Somos tu mejor opción</h1>
        <p>Quizás te interesen estos productos: cargadores, auriculares, fundas y más.</p>
    </section>

    <div class="search-bar-container">
        <input type="text" placeholder="Buscar productos..." class="search-bar" id="search-input">
    </div>

    <main id="featured-products" class="grid-productos">
        <p style="text-align: center; grid-column: 1/-1;">Cargando productos...</p>
    </main>

    <script type="module" src="script.js"></script>

</body>
</html>
