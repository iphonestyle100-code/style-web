<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IPHONE STYLE - Tienda</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #ebebeb; margin: 0; font-family: sans-serif; }
        header { background: #b6b6b5; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .grid-ml { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 20px; }
        .card-ml { background: white; border-radius: 4px; overflow: hidden; border: 1px solid #ddd; }
        .card-ml:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .img-ml { width: 100%; height: 200px; object-fit: contain; border-bottom: 1px solid #eee; }
        .info-ml { padding: 15px; }
        .precio-ml { font-size: 22px; margin: 0; color: #333; }
        .nombre-ml { font-size: 14px; color: #666; margin: 5px 0; font-weight: normal; }
        .btn-ml { width: 100%; background: #3483fa; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1 style="font-size: 18px;">IPHONE STYLE</h1>
        <button onclick="location.href='admin.html'">Panel Admin</button>
    </header>

    <div style="background: #b6b6b5; padding: 10px; text-align: center;">
        <input type="text" placeholder="Buscar..." oninput="window.renderizar(this.value)" style="width: 70%; padding: 10px; border-radius: 20px; border: none;">
    </div>

    <div id="grid-productos" class="grid-ml"></div>

    <script type="module" src="scripts.js"></script>
</body>
</html>
