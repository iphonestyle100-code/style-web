<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPHONE STYLE - Tienda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="background-color: #fff159; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center;">
            <img src="img/WhatsApp Image 2026-04-18 at 01.06.43.jpeg" style="height: 45px; margin-right: 10px;">
            <h1 style="font-size: 20px; color: #333; margin: 0;">IPHONE STYLE</h1>
        </div>
        <button onclick="accesoAdmin()" style="background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Admin</button>
    </header>

    <div style="background: #fff159; padding: 10px; text-align: center;">
        <input type="text" id="buscador" placeholder="Buscar productos..." oninput="window.renderizar(this.value)" 
               style="width: 80%; max-width: 500px; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none;">
    </div>

    <div id="grid-productos" class="productos-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; background: #ebebeb;">
        </div>

    <script type="module" src="scripts.js"></script>

    <script>
        function accesoAdmin() {
            const pass = prompt("Contraseña de Administrador:");
            if (pass === "123456Aa!") {
                location.href = 'admin.html';
            } else if (pass !== null) {
                alert("Incorrecta.");
            }
        }
    </script>
</body>
</html>
